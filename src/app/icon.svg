<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="48"/>
    </clipPath>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF0F6"/>
      <stop offset="100%" stop-color="#FFD6EB"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Outermost petal ring (10 petals) — darkest -->
  <g fill="#8B003E" clip-path="url(#circle-clip)">
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(36 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(72 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(108 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(144 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(216 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(252 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(288 50 50)"/>
    <ellipse cx="50" cy="16" rx="8" ry="15" transform="rotate(324 50 50)"/>
  </g>

  <!-- 2nd petal ring (10 petals, offset 18°) -->
  <g fill="#B5005E" clip-path="url(#circle-clip)">
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(18 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(54 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(90 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(126 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(162 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(198 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(234 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(270 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(306 50 50)"/>
    <ellipse cx="50" cy="20" rx="8" ry="13" transform="rotate(342 50 50)"/>
  </g>

  <!-- 3rd petal ring (8 petals) -->
  <g fill="#D4007A" clip-path="url(#circle-clip)">
    <ellipse cx="50" cy="26" rx="8" ry="12" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="26" rx="8" ry="12" transform="rotate(45 50 50)"/>
    <ellipse cx="50" cy="26" rx="8" ry="12" transform="rotate(90 50 50)"/>
    <ellipse cx="50" cy="26" rx="8" ry="12" transform="rotate(135 50 50)"/>
    <ellipse cx="50" cy="26" rx="8" ry="12" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="26" rx="8" ry="12" transform="rotate(225 50 50)"/>
    <ellipse cx="50" cy="26" rx="8" ry="12" transform="rotate(270 50 50)"/>
    <ellipse cx="50" cy="26" rx="8" ry="12" transform="rotate(315 50 50)"/>
  </g>

  <!-- 4th petal ring (8 petals, offset 22.5°) -->
  <g fill="#E0338B" clip-path="url(#circle-clip)">
    <ellipse cx="50" cy="31" rx="7" ry="10" transform="rotate(22.5 50 50)"/>
    <ellipse cx="50" cy="31" rx="7" ry="10" transform="rotate(67.5 50 50)"/>
    <ellipse cx="50" cy="31" rx="7" ry="10" transform="rotate(112.5 50 50)"/>
    <ellipse cx="50" cy="31" rx="7" ry="10" transform="rotate(157.5 50 50)"/>
    <ellipse cx="50" cy="31" rx="7" ry="10" transform="rotate(202.5 50 50)"/>
    <ellipse cx="50" cy="31" rx="7" ry="10" transform="rotate(247.5 50 50)"/>
    <ellipse cx="50" cy="31" rx="7" ry="10" transform="rotate(292.5 50 50)"/>
    <ellipse cx="50" cy="31" rx="7" ry="10" transform="rotate(337.5 50 50)"/>
  </g>

  <!-- Inner petal ring (6 petals) -->
  <g fill="#EC5CA0" clip-path="url(#circle-clip)">
    <ellipse cx="50" cy="37" rx="7" ry="9" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="37" rx="7" ry="9" transform="rotate(60 50 50)"/>
    <ellipse cx="50" cy="37" rx="7" ry="9" transform="rotate(120 50 50)"/>
    <ellipse cx="50" cy="37" rx="7" ry="9" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="37" rx="7" ry="9" transform="rotate(240 50 50)"/>
    <ellipse cx="50" cy="37" rx="7" ry="9" transform="rotate(300 50 50)"/>
  </g>

  <!-- Center -->
  <circle cx="50" cy="50" r="14" fill="#F47FB5"/>
  <circle cx="50" cy="50" r="8"  fill="#FAAED3"/>
  <circle cx="50" cy="50" r="3"  fill="#FFE0F0"/>
</svg>
